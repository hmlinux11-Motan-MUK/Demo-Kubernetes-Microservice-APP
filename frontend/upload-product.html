<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Product</title>
  <link rel="stylesheet" href="./upload-product.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <div class="card">
      <h2>Add New Product</h2>

      <div class="form-grid">
        <input type="text" id="product_ID" placeholder="Product ID" />
        <input type="text" id="product_title" placeholder="Product Title" />
        <input type="text" id="product_name" placeholder="Product Name" />
        <input type="text" id="product_price" placeholder="Product Price" />
        <input type="text" id="product_availability" placeholder="Availability" />
        <input type="number" id="catid" placeholder="Category ID" />
      </div>

      <textarea id="product_description" placeholder="Product Description"></textarea>

      <div class="file-upload">
        <input type="file" id="imageFile" />
      </div>

      <button onclick="uploadAndSaveProduct()">Upload Product</button>

      <p id="status"></p>
    </div>
  </div>

  <script src="upload-product.js"></script>
</body>
</html>
