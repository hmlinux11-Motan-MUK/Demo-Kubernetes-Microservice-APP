apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: ecommerce.local
      http:
        paths:
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /home
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3002

          - path: /products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3002

          - path: /add-product
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 3002

          - path: /upload
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3003

          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 3003

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80