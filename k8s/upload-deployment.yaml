apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upload-service
  template:
    metadata:
      labels:
        app: upload-service
    spec:
      containers:
        - name: upload-service
          image: hmlinux11/upload-service:latest
          ports:
            - containerPort: 3003
          volumeMounts:
            - name: upload-storage
              mountPath: /app/uploads
      volumes:
        - name: upload-storage
          persistentVolumeClaim:
            claimName: upload-pvc